# netlify.toml
# Static site — no build step needed.

[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"

# SPA-style redirect — all paths serve index.html
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
